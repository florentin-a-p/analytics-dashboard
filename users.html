<body> 
    <div id="root"></div>
    <script src="https://unpkg.com/react@16.12.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@16.12.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.8.3/babel.js"></script>
    <script src="https://unpkg.com/prop-types@15.6.1/prop-types.js"></script>
    <style>
    </style>
    <script type="text/babel">
        const rootElement = document.getElementById('root')

        function UserList() {
            const [userData, setUserData] = React.useState([])
            const [userDetails, setUserDetails] = React.useState([])

            React.useEffect(() => {
                fetchUsersData().then(userData => {setUserData(userData)})
            }, [])
            
            function handleClick(searchedName) {
                fetchUserDetails(searchedName).then(userDetails => {setUserDetails(userDetails), [searchedName]})
                
                console.log("flo is logging:")
                console.log(JSON.stringify(userDetails)) 
            }
            
            return (
                <>
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Company Name</th>
                            </tr>
                        </thead>
                        <tbody>
                            {userData.map((user) => (
                                <tr key = {user.id} >
                                    <td><button onClick = {() => handleClick(user.name)}>{user.name}</button></td>
                                    <td>{user.email}</td>
                                    <td>{user.company.name}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                    <hr/>
                    <p>
                        {userDetails && userDetails[0] ? "This is user details" : "No user selected"}
                    </p>
                    <div>
                        {userDetails && userDetails[0] &&  
                            <>
                                <div >Name: {userDetails[0].name} </div>
                                <div >Email: {userDetails[0].email} </div>
                                <div >Phone: {userDetails[0].phone} </div>
                                <div >Address: {userDetails[0].address.street}, {userDetails[0].address.suite}, {userDetails[0].address.city} {userDetails[0].address.zipcode} </div>
                                <div >Website: {userDetails[0].website} </div>
                            </>
                        }
                    </div>
                </>
            )
        }

        function fetchUserDetails(searchedName) {
            return window
                .fetch(`https://jsonplaceholder.typicode.com/users?name=${searchedName}`, {
                    method: 'GET'
                })
                .then(r => r.json())
            
        }

        function fetchUsersData() {
            return window
                .fetch('https://jsonplaceholder.typicode.com/users', {
                    method: 'GET'
                })
                .then(r => r.json())
        }

        function App() {
            return (
                <div>
                    <form>
                        <label htmlFor = "name" >Search name: </label>
                        <input id = "name" />
                    </form>
                    {UserList()}
                </div>
            )
        }

        function renderApp() {
            ReactDOM.render(<App />,rootElement)
        }

        renderApp()
    </script>
</body>
